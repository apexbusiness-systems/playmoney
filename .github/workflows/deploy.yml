name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress deployments if a newer push arrives.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: "1.3.11"
  NODE_VERSION: "22"

jobs:
  deploy:
    name: Deploy to Workers
    runs-on: ubuntu-latest
    # Only deploy if the CI verification pipeline (typecheck, lint, test, build) passes
    # NOTE: GitHub Actions doesn't easily let jobs depend on jobs in *other* workflows,
    # so we run the build step here explicitly and rely on branch protection to ensure
    # the CI workflow passes before merging to main.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config .output/server/wrangler.json
