name: CI

# Gates every PR and every push to main on the four canonical checks
# (typecheck · lint · test · build) plus the BUILT-default invariant guard.
# Canonical stack: Cloudflare + GitHub + Supabase. Runtime: Bun.
#
# db:verify-rls runs only when the required GitHub secrets are available;
# otherwise it exits successfully with an explicit skip notice.
# The app defaults to BUILT and no step sets live mode (see invariant guard).

on:
  pull_request:
  push:
    branches: [main]

# Newer pushes supersede in-flight runs on the same ref; main never cancels.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Elevated privilege to push the updated bun.lockb back to the PR
permissions:
  contents: write

env:
  BUN_VERSION: "1.3.11"
  NODE_VERSION: "22"

jobs:
  # Fast, secret-free static guard that the BUILT default is never weakened:
  # no production code path, env file, workflow, seed, or config may seed
  # the live mode. Test files set it transiently to PROVE the seal (T10)
  # and are intentionally excluded.
  invariant-guard:
    name: BUILT invariant guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assert no LIVE mode is seeded outside tests
        run: |
          set -euo pipefail
          matches="$(grep -rEn 'PLAYMONEY_MODE[[:space:]]*[:=][[:space:]]*"?LIVE' \
            --include='*.ts' --include='*.tsx' --include='*.yml' \
            --include='*.yaml' --include='*.env*' --include='*.sh' \
            --include='*.toml' --include='*.json' . \
            | grep -v '===' | grep -v '\.test\.' || true)"
          if [ -n "$matches" ]; then
            echo "::error::live mode seeded outside a test — BUILT default compromised."
            echo "$matches"
            exit 1
          fi
          echo "BUILT default intact: no LIVE mode seeded outside tests."

  verify:
    name: typecheck · lint · test · build
    runs-on: ubuntu-latest
    needs: invariant-guard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: |
          bun install
          if [ -n "$(git status --porcelain bun.lockb)" ]; then
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add bun.lockb package.json
            git commit -m "chore: update bun.lockb"
            git push origin HEAD:${{ github.head_ref }}
          fi

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

      # PR/main CI stays fork-safe: no production guard flag is set here, so local/mock
      # builds remain available outside the deploy workflow. PLAYMONEY_MODE is unset → BUILT.
      - name: Build (Cloudflare Workers · Nitro)
        run: bun run build

      - name: Verify RLS Policies
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_URL}" ] || [ -z "${SUPABASE_SERVICE_ROLE_KEY}" ]; then
            echo "::notice::Skipping db:verify-rls because SUPABASE_URL and/or SUPABASE_SERVICE_ROLE_KEY is unavailable."
            exit 0
          fi
          if [ -z "${SUPABASE_ANON_KEY}" ] && [ -z "${SUPABASE_PUBLISHABLE_KEY}" ]; then
            echo "::notice::Skipping db:verify-rls because neither SUPABASE_ANON_KEY nor SUPABASE_PUBLISHABLE_KEY is available."
            exit 0
          fi
          bun run db:verify-rls
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
